<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Map My Biz – Log In</title>
  <link rel="stylesheet" href="../CSS/style.css">
  <script src="../JS/script.js"></script>
</head>
<body>
   <!-- Navbar -->
   <nav class="navbar">
    <div class="logo-container">
      <img src="../Assets/nv.png" alt="Map My Biz Logo" />
    </div>
  </nav>

  <div class="container">
    <!-- Header -->
    <header class="header">
      <div class="logo-container">
        <img src="../Assets/Lg.png" alt="Map My Biz Logo">
      </div>
    </header>
    <!-- Login Section -->
    <div class="login-signup-container">
      <div class="auth-section login-section">
        <div class="login">
          <h2>LOG IN!</h2>
          <form id="loginForm">
            <input type="text" placeholder="Phone Number or Email Address" required />
            <!-- Password field with toggle -->
            <div class="password-wrapper">
              <input type="password" id="loginPassword" placeholder="Password" required />
              <span class="toggle-password" data-target="loginPassword">&#128065;</span>
            </div>
            <label class="remember-me">
              <input type="checkbox" id="rememberMe" /> Remember Me
            </label>
            <br>
            <button type="submit" class="btn-login">LOG IN</button>
          </form>
        </div>
      </div>
    </div>
  </div>
  <a href="./PAGES/forgot.html" id="forgotPassword">Forgot Your Password?</a>
   <!-- Language Selector -->
   <div class="language-selector text-center">
    <label>Select Language:</label>
    <select>
      <option value="en">English</option>
      <option value="af">Afrikaans</option>
    </select>
  </div>
  <!-- Help Link -->
  <div class="help-link text-center">
    <a href="#">Need Help?</a>
    <span class="help-icon">&#9432;</span>
  </div>

</body>
</html>
