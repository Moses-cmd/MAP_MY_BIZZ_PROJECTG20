<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Add Your Business - Map My Biz</title>
  <link rel="stylesheet" href="../CSS/style.css">
</head>
<body>

  <!-- Navigation Bar -->
  <nav class="navbar">
    <div class="logo-container">
      <img src="../Assets/MMB.png" alt="Map My Biz Logo" />
    </div>
    <div class="nav-links">
      <a href="./dashboard.html">Home</a>
      <a href="./course.html">Courses</a>
      <a href="./map.html">Smart Map</a>
      <a href="#">VR Training</a>
      <a href="./business.html">Business</a>
    </div>
    <div class="user-profile" id="userProfile">
      <div class="user-icon">👤</div>
      <span>Welcome, John!</span>
    </div>
  </nav>

  <div class="container">
    <h1>Add Your Business</h1>
    <form id="businessForm">
      <div class="form-group">
        <label for="name">Business Name</label>
        <input type="text" id="name" name="name" required />
      </div>

      <div class="form-group">
        <label for="category">Category</label>
        <select id="category" name="category" required>
          <option value="">-- Select Category --</option>
          <option value="Restaurant">Restaurant</option>
          <option value="Salon & Beauty">Salon & Beauty</option>
          <option value="Retail Shop">Retail Shop</option>
          <option value="Consulting">Consulting</option>
          <option value="Tech Services">Tech Services</option>
          <option value="Other">Other</option>
        </select>
      </div>

      <div class="form-group">
        <label for="location">Location (Address)</label>
        <textarea id="location" name="location" rows="3" required></textarea>
      </div>

      <div class="form-group">
        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" name="phone" />
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" />
      </div>

      <div class="form-group">
        <label for="description">Description</label>
        <textarea id="description" name="description" rows="4"></textarea>
      </div>

      <button type="submit" class="btn-add">Add Business</button>
    </form>

    <div id="message" class="message"></div>
  </div>

  <script src="../JS/script.js"></script>
  <script>
    // Initialize form handler after script loads
    document.addEventListener("DOMContentLoaded", handleBusinessForm);
  </script>
</body>
</html>
