<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Map My Biz - Empowering Rural Business & Tourism</title>
  <link rel="stylesheet" href="./CSS/style.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <div class="logo-container">
        <img src="./Assets/Lg.png" alt="Map My Biz Logo">
      </div>
      <div class="auth-section signup-section">
        <h4> <a href="./PAGES/businessId.html">Sign in with Business ID</a> </h4>
      </div>
    </header>

    <!-- Auth Container -->
    <div class="login-signup-container">

      <!-- Login Section -->
      <div class="auth-section login-section">
        <div class="login">
          <h2>LOG IN!</h2>
          <form id="loginForm">
            <input type="text" placeholder="Phone Number or Email Address" required />

            <!-- Password field -->
            <div class="password-wrapper">
              <input type="password" id="loginPassword" placeholder="Password" required />
              <span class="toggle-password" data-target="loginPassword">&#128065;</span>
            </div>

            <label class="remember-me">
              <input type="checkbox" id="rememberMe" />
              Remember Me
            </label>

            <br>
            <button type="submit" class="btn-login">LOG IN</button>
            <br>
            <a href="./PAGES/forgot.html" id="forgotPassword">Forgot Your Password?</a>
            
          </form>
        </div>
      </div>

      <div class="separator"></div>
      <!-- Sign-Up Section -->
      <div class="auth-section signup-section">
        <h2>Create An Account</h2>
        <form id="signupForm">
          <input type="text" placeholder="Full Name" required />
          <input type="text" placeholder="Phone Number or Email Address" required />
          <!-- Password fields -->
          <div class="password-wrapper">
            <input type="password" id="signupPassword" placeholder="Password" required />
            <input type="password" id="confirmPassword" placeholder="Confirm Password" required />
            <span class="toggle-password" data-target="signupPassword">&#128065;</span>
          </div>

          <button type="submit" class="btn-secondary">SIGN UP</button>
           <!-- Language Selector -->
      <div class="language-selector">
        <br>
        <label>Select Language:</label>
        <br>
        <select>
          <option>English</option>
          <option>Afrikaans</option>
        </select>
      </div>
       <!-- Help Link -->
       <div class="help-link">
        <a href="#">Need Help?</a>
        <span class="help-icon">&#9432;</span>
      </div>
        </form>
      </div>
      
    </div>
  </div>
<!-- In your login form handler (e.g., login.js or inline script) -->
<script>
  function handleLogin(username) {
    // ✅ Reset progress for this user
    localStorage.removeItem("completedModules");

    // ✅ Optionally: Save current user
    localStorage.setItem("currentUser", username);

    // Redirect to dashboard
    window.location.href = "PAGES/dashboard.html";
  }
</script>
  <script type="module" src="./JS/script.js"></script>
</body>
</html>
