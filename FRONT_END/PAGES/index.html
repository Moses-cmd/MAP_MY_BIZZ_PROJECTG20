<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Map My Biz - Empowering Rural Business & Tourism<</title>
  <link rel="stylesheet" href="/MAP_MY_BIZZ_PROJECTG20/FRONT_END/CSS/styles.css" />
</head>
<body>
  <div class="container">
    <header class="header">
  <div class="logo-container">
    <!-- Replace 'images/logo.jpg' with the path to your uploaded image -->
    <img src="/MAP_MY_BIZZ_PROJECTG20/FRONT_END/Assets/Lg.png" alt="Map My Biz Logo">
    
  </div>
</header>
    <div class="login-signup-container">
      <!-- Login Section -->
      <div class="auth-section login-section">
      <div class="login">
        <h2>Welcome Back!</h2>
        <form id="loginForm">
          <input type="text" placeholder="Phone Number or Email Address" required />

          <!-- Example for Login Password input -->
          <div class="password-wrapper">
            <input type="password" id="loginPassword" placeholder="Password" required />
            <span class="toggle-password" data-target="loginPassword">&#128065;</span>

          </div>
          <label class="remember-me">
            <input type="checkbox" id="rememberMe" />
            Remember Me
          </label>

            <br>
            <button type="submit" class="btn-login">LOG IN</button>
            <br>
          <a href="/MAP_MY_BIZZ_PROJECTG20/FRONT_END/PAGES/forgot.html" id="forgotPassword">Forgot Your Password?</a>
        </form>
          </div>
      </div>
 <div class="separator"></div>
      <!-- Sign-Up Section -->
      <div class="auth-section signup-section">
      <div class="signup-section">
        <h2>Create An Account</h2>
        <form id="signupForm">
          <input type="text" placeholder="Full Name" required />
          <input type="text" placeholder="Phone Number or Email Address" required />
          <!-- Example for Login Password input -->
<div class="password-wrapper">
  <input type="password" id="signupPassword" placeholder="Password" required />
  <input type="password" id="signupPassword" placeholder=" Confirm Password" required />
  <span class="toggle-password" data-target="signupPassword">&#128065;</span>
</div>
 
  <button type="submit" class="btn-secondary">SIGN UP</button>
        </form>
          </div>
      </div>

      <!-- Language Selector -->
      <div class="language-selector">
        <br>
        <label>Select Language:</label>
        <br>
        <select>
          <option>English</option>
          <option>Afrikaans</option>
        </select>
      </div>

      <!-- Help Link -->
      <div class="help-link">
        <a href="#">Need Help?</a>
        <span class="help-icon">&#9432;</span>
      </div>

    </div>
  </div>

  <script src="/MAP_MY_BIZZ_PROJECTG20/FRONT_END/JS/script.js"></script>
</body>
</html>
